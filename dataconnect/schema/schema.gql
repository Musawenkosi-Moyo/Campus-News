type User @table {
  displayName: String!
  email: String!
  createdAt: Timestamp!
  photoUrl: String
  isAdmin: Boolean
}

type Category @table {
  name: String!
  createdAt: Timestamp!
  description: String
}

type Article @table {
  title: String!
  content: String!
  publishedAt: Timestamp!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  imageUrl: String
  author: User
  category: Category
}

type Event @table {
  title: String!
  description: String!
  eventDate: Date!
  location: String!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  imageUrl: String
  startTime: String
  endTime: String
  organizer: User
  category: Category
}

type UserFavorite @table {
  user: User!
  createdAt: Timestamp!
  article: Article
  event: Event
}